server:
  port: ${PORT:8080}

ms:
  productos:
    url: ${MS_PRODUCTOS_URL:http://localhost:8081}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: WARN
    com.duoc.ms_pedidos: INFO

springdoc:
  swagger-ui:
    enabled: true
