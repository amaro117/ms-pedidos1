spring:
  application:
    name: ms-pedidos
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

# Puerto: Render inyecta la variable PORT dinámicamente; local/docker cae a 8082
server:
  port: ${PORT:8082}

ms:
  productos:
    url: ${MS_PRODUCTOS_URL:http://localhost:8081}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
